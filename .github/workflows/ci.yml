name: CI Pipeline with Test Report Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  TEST_ANALYZER_API_URL: ${{ secrets.TEST_ANALYZER_API_URL || 'http://localhost:8000' }}
  PROJECT_NAME: ${{ github.repository }}
  
jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --junitxml=test-results/junit.xml \
            --cov=. \
            --cov-report=xml \
            --cov-report=term
        continue-on-error: true
      
      - name: Upload test results to analyzer
        if: always()
        continue-on-error: true
        run: |
          # Only attempt upload if API URL is configured (not default localhost)
          if [[ "${{ env.TEST_ANALYZER_API_URL }}" == "http://localhost:8000" ]]; then
            echo "Skipping test result upload (API URL not configured)"
            echo "To enable: Set TEST_ANALYZER_API_URL secret to your deployed API"
          else
            echo "Uploading test results to ${{ env.TEST_ANALYZER_API_URL }}"
            curl -X POST "${{ env.TEST_ANALYZER_API_URL }}/api/v1/ingest" \
              -F "file=@test-results/junit.xml" \
              -F "project=${{ env.PROJECT_NAME }}" \
              -F "branch=${{ github.ref_name }}" \
              -F "build_id=${{ github.run_id }}" \
              -F "async_processing=false" \
              || echo "✗ Failed to upload test results"
          fi
      
      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
  
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: |
          pip install black==24.1.1 ruff==0.2.1 mypy==1.8.0
      
      - name: Check code formatting
        run: black --check .
      
      - name: Run ruff linter
        run: ruff check .
      
      - name: Run type checking
        run: mypy . --ignore-missing-imports
        continue-on-error: true
  
  build-docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: test-analyzer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Uncomment to push to a container registry
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      # 
      # - name: Push Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: .
      #     push: true
      #     tags: |
      #       your-registry/test-analyzer:latest
      #       your-registry/test-analyzer:${{ github.sha }}

  # Analyze trends job - only runs if TEST_ANALYZER_API_URL secret is configured
  # This job calls a deployed Test Analyzer API instance to get insights
  # To enable: Set TEST_ANALYZER_API_URL in repository secrets (e.g., https://test-analyzer.yourcompany.com)
  analyze-trends:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    
    steps:
      - name: Check if API is accessible
        id: api-check
        run: |
          if [[ "${{ env.TEST_ANALYZER_API_URL }}" == "http://localhost:8000" ]]; then
            echo "API URL not configured (using default localhost)"
            echo "To enable trend analysis: Set TEST_ANALYZER_API_URL secret in repository settings"
            echo "Example: https://test-analyzer.yourcompany.com"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Testing API accessibility at ${{ env.TEST_ANALYZER_API_URL }}"
            # Test if API is accessible
            if curl -f -s --max-time 5 "${{ env.TEST_ANALYZER_API_URL }}/health" > /dev/null 2>&1; then
              echo "✓ API is accessible"
              echo "skip=false" >> $GITHUB_OUTPUT
            else
              echo "✗ API is not accessible at ${{ env.TEST_ANALYZER_API_URL }}"
              echo "skip=true" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Get project health score
        if: steps.api-check.outputs.skip != 'true'
        run: |
          curl -X GET "${{ env.TEST_ANALYZER_API_URL }}/api/v1/trends/health-score?project=${{ env.PROJECT_NAME }}&days=7" \
            -H "accept: application/json" \
            || echo "Failed to get health score"
      
      - name: Check for flaky tests
        if: steps.api-check.outputs.skip != 'true'
        run: |
          curl -X GET "${{ env.TEST_ANALYZER_API_URL }}/api/v1/tests/flaky?project=${{ env.PROJECT_NAME }}&lookback_runs=20&min_flakiness=0.2" \
            -H "accept: application/json" \
            || echo "Failed to check flaky tests"
      
      - name: Check for performance regressions
        if: steps.api-check.outputs.skip != 'true'
        run: |
          curl -X GET "${{ env.TEST_ANALYZER_API_URL }}/api/v1/tests/slow/regressions?project=${{ env.PROJECT_NAME }}&lookback_days=7&threshold_increase=0.2" \
            -H "accept: application/json" \
            || echo "Failed to check performance regressions"
